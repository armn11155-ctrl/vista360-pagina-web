<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:fixed; inset:0; z-index:-1; pointer-events:none; background:#ffffff;">
  <canvas ref="{{ setNet }}" aria-hidden="true" style="position:absolute; inset:0; width:100%; height:100%; display:block;"></canvas>
  <div style="position:absolute; inset:0; background:radial-gradient(120% 90% at 50% -10%, rgba(28,111,232,0.07), rgba(255,255,255,0) 60%);"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() { if (this.netEl && !this._started) { this._started = true; this.startNetwork(); } }

  startNetwork() {
    const canvas = this.netEl;
    const ctx = canvas.getContext('2d', { alpha: true });
    const dpr = Math.min(window.devicePixelRatio || 1, 1.6);
    let w = 0, h = 0, pts = [];
    const resize = () => {
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const target = Math.min(90, Math.max(34, Math.round((w * h) / 26000)));
      const cur = pts.length;
      if (target > cur) {
        for (let i = cur; i < target; i++) pts.push({
          x: Math.random() * w, y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.95, vy: (Math.random() - 0.5) * 0.95,
          r: 0.8 + Math.random() * 1.7, glow: Math.random() < 0.18
        });
      } else if (target < cur) { pts.length = target; }
    };
    resize();
    this._onResize = () => resize();
    window.addEventListener('resize', this._onResize);
    const maxDist = 162;
    const tick = () => {
      this._netRAF = requestAnimationFrame(tick);
      if (!w || !h) return;
      ctx.clearRect(0, 0, w, h);
      for (const p of pts) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < -20) p.x = w + 20; else if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20; else if (p.y > h + 20) p.y = -20;
      }
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const a = pts[i], b = pts[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < maxDist * maxDist) {
            const d = Math.sqrt(d2);
            const o = (1 - d / maxDist);
            const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
            g.addColorStop(0, 'rgba(28,111,232,' + (o * 0.20).toFixed(3) + ')');
            g.addColorStop(1, 'rgba(86,162,255,' + (o * 0.20).toFixed(3) + ')');
            ctx.strokeStyle = g; ctx.lineWidth = 0.9;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }
      for (const p of pts) {
        if (p.glow) {
          ctx.shadowColor = 'rgba(28,111,232,0.55)'; ctx.shadowBlur = 10;
          ctx.fillStyle = 'rgba(28,111,232,0.85)';
        } else {
          ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(14,42,85,0.55)';
        }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.shadowBlur = 0;
    };
    this._netRAF = requestAnimationFrame(tick);
  }

  componentWillUnmount() {
    if (this._netRAF) cancelAnimationFrame(this._netRAF);
    if (this._onResize) window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    return { setNet: (el) => { this.netEl = el; if (el && !this._started) { this._started = true; this.startNetwork(); } } };
  }
}
</script>
</body>
</html>
