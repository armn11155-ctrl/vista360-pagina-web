<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<a href="{{ waLink }}" target="_blank" rel="noopener" aria-label="Escríbenos por WhatsApp" style="position:fixed; right:20px; bottom:20px; z-index:300; width:60px; height:60px; border-radius:50%; background:#25D366; display:flex; align-items:center; justify-content:center; box-shadow:none; text-decoration:none; transition:transform .25s ease;" style-hover="transform:scale(1.08);">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2zm0 18.2a8.2 8.2 0 0 1-4.2-1.15l-.3-.18-2.9.76.78-2.83-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.5-5.7c-.25-.13-1.46-.72-1.69-.8-.22-.09-.39-.13-.55.12-.16.25-.63.8-.77.96-.14.16-.28.18-.52.06-.72-.3-1.42-.73-2-1.42-.46-.51-.77-1.05-1.06-1.74-.13-.25 0-.4.11-.52l.4-.42c.12-.13.16-.22.24-.37.08-.16.04-.3-.02-.42-.06-.13-.55-1.32-.75-1.8-.2-.48-.4-.41-.55-.42h-.47c-.16 0-.42.06-.64.31-.22.25-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.7 2.6 4.12 3.64.58.25 1.03.4 1.38.51.58.18 1.1.16 1.52.1.46-.07 1.46-.6 1.66-1.18.2-.58.2-1.07.14-1.18-.06-.1-.22-.16-.46-.28z"></path></svg>
</a>

<!-- Sello fijo "Protegido por Cloudflare" -- visible en todas las paginas
     sin tener que bajar al footer, igual al de la referencia. Se expande
     al pasar el mouse (en celular se queda colapsado, solo el icono). -->
<div aria-label="Sitio protegido por Cloudflare" style="position:fixed; left:20px; bottom:20px; z-index:300; display:flex; align-items:center; gap:8px; height:40px; padding:0 12px; border-radius:20px; background:rgba(5,8,15,0.92); border:1px solid rgba(255,255,255,0.14); overflow:hidden; width:40px; box-sizing:border-box; transition:width .35s cubic-bezier(.16,1,.3,1); cursor:default;" style-hover="width:222px;">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;"><path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6z"></path><path d="M9.5 12.5l1.8 1.8 3.2-3.6"></path></svg>
  <span style="font-size:12px; color:#fff; white-space:nowrap; opacity:0.92;">Sitio protegido por Cloudflare</span>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:100,&quot;height&quot;:100},&quot;phone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;51999000000&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;message&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hola VISTA360, me gustaría recibir información.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const phone = this.props.phone ?? '51999000000';
    const text = this.props.message ?? 'Hola VISTA360, me gustaría recibir información.';
    return {
      waLink: 'https://wa.me/' + phone.replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent(text)
    };
  }
}
</script>
</body>
</html>
