<x-dc>
<helmet>
<style>
  .v-wa-btn { transition: transform .25s ease; }
  .v-wa-btn:hover { transform: scale(1.08); }
  .v-shield-badge { display:none !important; transition: width .35s cubic-bezier(.16,1,.3,1); width: 54px; flex-direction: row-reverse; }
  .v-shield-badge:hover { width: 290px; }
  /* Solo computadora: en celular no existe el "cursor" que activa el hover,
     y el usuario pidió que esto sea exclusivo de la version web. */
  @media (max-width: 760px) {
    .v-shield-badge { display: none !important; }
  }
</style>
</helmet>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:100,&quot;height&quot;:100},&quot;phone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;51999000000&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;message&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hola VISTA360, me gustaría recibir información.&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  componentDidMount() {
    const badge = document.getElementById('vShieldBadge');
    if (!badge) return;
    const sync = () => {
      badge.style.display = (window.innerWidth <= 760) ? 'none' : 'flex';
    };
    sync();
    window.addEventListener('resize', sync);
    this._syncShield = sync;
  }

  componentWillUnmount() {
    if (this._syncShield) window.removeEventListener('resize', this._syncShield);
  }

  renderVals() {
    const phone = this.props.phone ?? '51999000000';
    const text = this.props.message ?? 'Hola VISTA360, me gustaría recibir información.';
    return {
      waLink: 'https://wa.me/' + phone.replace(/[^0-9]/g, '') + '?text=' + encodeURIComponent(text)
    };
  }
}
</script>
