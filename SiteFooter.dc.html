  .v-foot-contact a, .v-foot-contact span.row { display:flex; align-items:center; gap:12px; color:#AEB6C6; font-size:14.5px; text-decoration:none; transition:color .2s ease; }

  .v-foot-ico { flex:0 0 auto; width:34px; height:34px; border-radius:10px; background:rgba(86,162,255,0.12); display:flex; align-items:center; justify-content:center; color:#56A2FF; }
