<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .vn-links { display:flex; align-items:center; gap:clamp(20px,2.2vw,38px); }
  .vn-burger { display:none; }
  @media (max-width: 940px){
    .vn-links { display:none !important; }
    .vn-cta { display:none !important; }
    .vn-burger { display:flex !important; }
    /* inset:0 a veces no llega hasta el fondo real cuando la barra de
       Safari cambia de tamaño, dejando un hueco abajo sin el fondo
       oscuro del menú. Forzamos la altura al maximo posible (lvh). */
    #vnMobileMenu { height: 100vh; height: 100lvh; }
  }
</style>
</helmet>
<nav style="{{ navStyle }}">
  <div style="width:100%; max-width:1500px; margin:0 auto; padding:0 clamp(20px,5vw,72px); height:66px; display:flex; align-items:center; justify-content:space-between; gap:28px; font-family:'Plus Jakarta Sans','Helvetica Neue',Helvetica,Arial,sans-serif;">
    <a href="index.html" style="display:flex; align-items:center; text-decoration:none;">
      <img src="vista360-logo.png" alt="VISTA360" style="height:30px; width:auto; display:block;" />
    </a>
    <div class="vn-links">
      <a href="index.html" style="{{ inicioStyle }}" style-hover="color:#fff;">Inicio</a>
      <a href="productos.html" style="{{ productosStyle }}" style-hover="color:#fff;">Productos</a>
      <a href="servicios.html" style="{{ serviciosStyle }}" style-hover="color:#fff;">Servicios</a>
      <a href="nosotros.html" style="{{ nosotrosStyle }}" style-hover="color:#fff;">Nosotros</a>
    </div>
    <a href="contacto.html" class="vn-cta" style="text-decoration:none; padding:11px 28px; border-radius:999px; background:#1C6FE8; color:#fff; font-size:15px; font-weight:600; white-space:nowrap; transition:background .25s ease, transform .2s ease;" style-hover="background:#1559C4; transform:translateY(-1px);">Cotizar</a>
    <button class="vn-burger" onClick="{{ toggleMenu }}" aria-label="Menú" style="flex-direction:column; gap:5px; background:transparent; border:none; cursor:pointer; padding:6px;">
      <span style="width:24px; height:2px; background:#fff; border-radius:2px;"></span>
      <span style="width:24px; height:2px; background:#fff; border-radius:2px;"></span>
    </button>
  </div>
</nav>
<div id="vnMobileMenu" style="{{ menuStyle }}">
  <button onClick="{{ closeMenu }}" aria-label="Cerrar" style="position:absolute; top:22px; right:24px; background:transparent; border:none; color:#fff; font-size:34px; cursor:pointer; line-height:1; font-family:'Plus Jakarta Sans',sans-serif;">&times;</button>
  <sc-for list="{{ mlinksTop }}" as="ml" hint-placeholder-count="1">
    <a href="{{ ml.href }}" onClick="{{ closeMenu }}" style="text-decoration:none; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">{{ ml.label }}</a>
  </sc-for>

  <button type="button" onClick="{{ toggleMobileProducts }}" style="display:flex; align-items:center; gap:9px; background:transparent; border:none; cursor:pointer; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">
    Productos
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="{{ mobileProductsChevStyle }}"><path d="M6 9l6 6 6-6"></path></svg>
  </button>
  <div style="{{ mobileProductsPanelStyle }}">
    <a href="vista360-classic.html" onClick="{{ closeMenu }}" style="text-decoration:none; color:rgba(255,255,255,0.85); font-size:19px; font-weight:600; padding:6px 12px; font-family:'Plus Jakarta Sans',sans-serif;">VISTA360 Classic</a>
    <a href="vista360-digital.html" onClick="{{ closeMenu }}" style="text-decoration:none; color:rgba(255,255,255,0.85); font-size:19px; font-weight:600; padding:6px 12px; font-family:'Plus Jakarta Sans',sans-serif;">VISTA360 Digital</a>
  </div>

  <sc-for list="{{ mlinksBottom }}" as="ml" hint-placeholder-count="3">
    <a href="{{ ml.href }}" onClick="{{ closeMenu }}" style="text-decoration:none; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">{{ ml.label }}</a>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:66},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;productos&quot;,&quot;servicios&quot;,&quot;ubicaciones&quot;,&quot;portafolio&quot;,&quot;contacto&quot;],&quot;default&quot;:&quot;inicio&quot;},&quot;transparent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;topColor&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#0A1426&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false, menuOpen: false, mobileProductsOpen: false };

  componentDidMount() {
    this.onScroll = () => {
      const s = window.scrollY > 40;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this.onScroll, { passive: true });
    this.onScroll();
    this.applyThemeColor();
  }
  applyThemeColor() {
    const meta = document.querySelector('meta[name="theme-color"]');
    if (!meta) return;
    const topColor = this.props.topColor || '#0A1426'; // color de marca por defecto; cada pagina puede pasar el tono de su propio hero
    const solidColor = '#081428';  // mismo color solido que usan el navbar y el menu
    const menuColor = '#081428';   // unificado: el mismo tono exacto, sin diferencia
    const transparent = this.props.transparent ?? false;
    const scrolled = !!this.state.scrolled;
    const menuOpen = !!this.state.menuOpen;
    const solid = !transparent || scrolled;
    meta.setAttribute('content', menuOpen ? menuColor : (solid ? solidColor : topColor));
  }
  componentDidUpdate() {
    this.applyThemeColor();
    // El framework solo pasa prevProps, no prevState; guardamos el último
    // valor en una propiedad propia para detectar el cambio de menuOpen.
    var open = !!this.state.menuOpen;
    if (open !== this.__lastMenuOpen) {
      this.__lastMenuOpen = open;
      // Bloquear el scroll de la página de fondo: si se puede mover detrás
      // del menú, Safari pierde la referencia de dónde termina realmente
      // la pantalla y deja ver un hueco con contenido de otra parte abajo.
      var html = document.documentElement;
      if (open) {
        this.__scrollY = window.scrollY;
        html.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.top = (-this.__scrollY) + 'px';
        document.body.style.width = '100%';
      } else {
        html.style.overflow = '';
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.width = '';
        window.scrollTo(0, this.__scrollY || 0);
      }
    }
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.width = '';
  }

  renderVals() {
    const active = this.props.active || 'inicio';
    const transparent = this.props.transparent ?? false;
    const scrolled = !!this.state.scrolled;
    const solid = !transparent || scrolled;

    const navStyle = {
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 150,
      transform: 'translateZ(0)', willChange: 'transform',
      // iOS 26 ya no usa theme-color: copia el background-color (no el
      // "background" con degradado) del elemento fijo de arriba para la
      // barra de estado. Por eso se separan en dos propiedades: una sólida
      // y limpia para que Safari la copie, y el degradado visual aparte.
      backgroundColor: solid ? '#081428' : 'transparent',
      backgroundImage: solid ? 'linear-gradient(100deg, #081428 0%, #0C2143 100%)' : 'none',
      boxShadow: scrolled ? '0 8px 30px rgba(5,12,28,0.42)' : 'none',
      borderBottom: '1px solid ' + (solid ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0)'),
      transition: 'box-shadow .4s ease, border-color .4s ease' /* sin transición en el color de fondo:
        animar el fondo de un elemento fijo mientras se hace scroll activo puede verse tembloroso/inestable en iOS */
    };

    const baseLink = (key) => ({
      textDecoration: 'none', fontSize: '16px', whiteSpace: 'nowrap', cursor: 'pointer',
      fontWeight: key === active ? 700 : 500,
      color: key === active ? '#fff' : 'rgba(255,255,255,0.82)',
      transition: 'color .2s'
    });
    const inicioStyle = baseLink('inicio');
    const productosStyle = baseLink('productos');
    const serviciosStyle = baseLink('servicios');
    const ubicacionesStyle = baseLink('ubicaciones');
    const nosotrosStyle = baseLink('nosotros');

    const mlinksTop = [
      ['Inicio', 'index.html']
    ].map(([label, href]) => ({ label, href }));

    const mlinksBottom = [
      ['Servicios', 'servicios.html'],
      ['Nosotros', 'nosotros.html'],
      ['Contacto', 'contacto.html']
    ].map(([label, href]) => ({ label, href }));

    const mobileProductsOpen = !!this.state.mobileProductsOpen;
    const mobileProductsChevStyle = { transform: mobileProductsOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform .3s ease' };
    const mobileProductsPanelStyle = {
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '10px',
      maxHeight: mobileProductsOpen ? '160px' : '0px',
      opacity: mobileProductsOpen ? 1 : 0,
      overflow: 'hidden',
      margin: mobileProductsOpen ? '4px 0 8px' : '0px',
      transition: 'max-height .4s cubic-bezier(.16,1,.3,1), opacity .3s ease, margin .4s ease'
    };

    const menuOpen = !!this.state.menuOpen;
    const menuStyle = {
      position: 'fixed', inset: 0, zIndex: 200, background: '#081428', backdropFilter: 'blur(20px)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '4px',
      opacity: menuOpen ? 1 : 0, visibility: menuOpen ? 'visible' : 'hidden', pointerEvents: menuOpen ? 'auto' : 'none',
      transition: 'opacity .35s ease, visibility .35s ease'
    };

    return {
      navStyle, inicioStyle, productosStyle, serviciosStyle, ubicacionesStyle, nosotrosStyle,
      mlinksTop, mlinksBottom, menuStyle,
      mobileProductsChevStyle, mobileProductsPanelStyle,
      toggleMobileProducts: () => this.setState((s) => ({ mobileProductsOpen: !s.mobileProductsOpen })),
      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false, mobileProductsOpen: false })
    };
  }
}
</script>
</body>
</html>
