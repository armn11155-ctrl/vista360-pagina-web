<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .vn-nav-inner {
    width:100%;
    max-width:1500px;
    height:66px;
    margin:0 auto;
    padding:0 clamp(20px,5vw,72px);
    display:grid;
    grid-template-columns:minmax(190px,1fr) auto minmax(190px,1fr);
    align-items:center;
    gap:28px;
    font-family:'Plus Jakarta Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  .vn-links { display:flex; align-items:center; gap:clamp(20px,2vw,32px); }
  .vn-nav-logo { justify-self:start; }
  .vn-cta { justify-self:end; }
  .vn-nav-logo img { transition:opacity .22s ease,transform .22s ease; }
  .vn-nav-logo:hover img { opacity:.9; transform:translateY(-1px); }
  .vn-nav-link {
    position:relative;
    display:inline-flex;
    align-items:center;
    height:66px;
  }
  .vn-nav-link::after {
    content:"";
    position:absolute;
    right:0;
    bottom:9px;
    left:0;
    height:2px;
    border-radius:2px;
    background:#4B91F2;
    box-shadow:0 0 10px rgba(75,145,242,.42);
    transform:scaleX(var(--vn-active,0));
    transform-origin:center;
    transition:transform .26s cubic-bezier(.16,1,.3,1);
  }
  .vn-nav-link:hover::after,
  .vn-nav-link:focus-visible::after { transform:scaleX(1); }
  .vn-nav-link:focus-visible { outline:none; }
  .vn-formats-menu {
    position:relative;
    display:flex;
    align-items:center;
    height:66px;
  }
  .vn-formats-menu::before {
    content:"";
    position:absolute;
    top:54px;
    left:50%;
    width:390px;
    height:24px;
    transform:translateX(-50%);
  }
  .vn-formats-dropdown {
    position:absolute;
    z-index:4;
    top:58px;
    left:50%;
    width:370px;
    padding:12px;
    border:1px solid rgba(255,255,255,.1);
    border-radius:8px;
    background:rgba(5,8,15,.94);
    box-shadow:0 24px 70px rgba(0,0,0,.38),0 1px 0 rgba(255,255,255,.06) inset;
    backdrop-filter:blur(22px) saturate(130%);
    -webkit-backdrop-filter:blur(22px) saturate(130%);
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transform:translate(-50%,10px);
    transform-origin:50% 0;
    transition:opacity .2s ease,visibility .2s ease,transform .3s cubic-bezier(.16,1,.3,1);
  }
  .vn-formats-menu:hover .vn-formats-dropdown,
  .vn-formats-menu:focus-within .vn-formats-dropdown {
    opacity:1;
    visibility:visible;
    pointer-events:auto;
    transform:translate(-50%,0);
  }
  .vn-formats-dropdown__label {
    display:block;
    padding:5px 8px 10px;
    color:rgba(255,255,255,.46);
    font-size:10px;
    font-weight:800;
    letter-spacing:.13em;
    text-transform:uppercase;
  }
  .vn-format-option {
    position:relative;
    display:grid;
    grid-template-columns:34px 1fr 18px;
    gap:12px;
    align-items:center;
    min-height:78px;
    padding:12px;
    border-radius:6px;
    color:#FFFFFF;
    text-decoration:none;
    transition:background .2s ease,transform .2s ease;
  }
  .vn-format-option + .vn-format-option { margin-top:4px; }
  .vn-format-option:hover,
  .vn-format-option:focus-visible {
    background:rgba(255,255,255,.075);
    transform:translateX(2px);
    outline:none;
  }
  .vn-format-option__index {
    display:grid;
    place-items:center;
    width:34px;
    height:34px;
    border:1px solid rgba(124,177,255,.25);
    border-radius:50%;
    color:#7CB1FF;
    background:rgba(23,105,232,.11);
    font-size:10px;
    font-weight:800;
  }
  .vn-format-option strong {
    display:block;
    margin-bottom:5px;
    font-size:15px;
    letter-spacing:0;
  }
  .vn-format-option small {
    display:block;
    color:rgba(255,255,255,.56);
    font-size:11px;
    line-height:1.45;
  }
  .vn-format-option__arrow {
    color:#7CB1FF;
    font-size:17px;
    transition:transform .2s ease;
  }
  .vn-format-option:hover .vn-format-option__arrow,
  .vn-format-option:focus-visible .vn-format-option__arrow { transform:translateX(3px); }
  .vn-format-option--digital::after {
    content:"Próximamente";
    position:absolute;
    top:10px;
    right:34px;
    color:#7CB1FF;
    font-size:8px;
    font-weight:800;
    letter-spacing:.08em;
    text-transform:uppercase;
  }
  .vn-cta {
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .vn-cta::after {
    content:"\2192";
    font-size:16px;
    transition:transform .22s ease;
  }
  .vn-cta:hover::after { transform:translateX(4px); }
  .vn-mobile-link {
    position:relative;
    transition:color .2s ease,transform .2s ease;
  }
  .vn-mobile-link:hover { color:#8DB9FF !important; transform:translateX(3px); }
  .vn-mobile-cta {
    display:inline-flex;
    align-items:center;
    gap:9px;
    margin-top:18px;
    padding:13px 21px;
    border-radius:8px;
    background:#1C6FE8;
    color:#FFFFFF;
    font-size:16px;
    font-weight:750;
    text-decoration:none;
    font-family:'Plus Jakarta Sans',sans-serif;
  }
  .vn-mobile-cta::after { content:"\2192"; }
  .vn-burger { display:none; }
  @media (max-width: 940px){
    .vn-nav-inner {
      display:flex;
      justify-content:space-between;
    }
    .vn-links { display:none !important; }
    .vn-cta { display:none !important; }
    .vn-burger { display:flex !important; }
    .vn-formats-dropdown { display:none !important; }
    /* inset:0 a veces no llega hasta el fondo real cuando la barra de
       Safari cambia de tamaño, dejando un hueco abajo sin el fondo
       oscuro del menú. Forzamos la altura al maximo posible (lvh). */
    #vnMobileMenu { height: 100vh; height: 100lvh; }
  }
</style>
</helmet>
<nav style="{{ navStyle }}">
  <div class="vn-nav-inner">
    <a href="index.html" class="vn-nav-logo" style="display:flex; align-items:center; text-decoration:none;">
      <img src="vista360-logo.png" alt="VISTA360" style="height:34px; width:auto; display:block;" />
    </a>
    <div class="vn-links">
      <a href="index.html" class="vn-nav-link" style="{{ inicioStyle }}" style-hover="color:#fff;">Inicio</a>
      <div class="vn-formats-menu">
        <a href="productos.html" class="vn-nav-link" aria-haspopup="true" style="{{ productosStyle }}" style-hover="color:#fff;">Formatos</a>
        <div class="vn-formats-dropdown" aria-label="Familias de formatos">
          <span class="vn-formats-dropdown__label">Explorar formatos</span>
          <a class="vn-format-option" href="vista360-classic.html">
            <span class="vn-format-option__index">01</span>
            <span><strong>VISTA360 Classic</strong><small>Mural · Unipolar · Tótem</small></span>
            <span class="vn-format-option__arrow">&rarr;</span>
          </a>
          <a class="vn-format-option vn-format-option--digital" href="vista360-digital.html">
            <span class="vn-format-option__index">02</span>
            <span><strong>VISTA360 Digital</strong><small>Panel LED · Tótem digital</small></span>
            <span class="vn-format-option__arrow">&rarr;</span>
          </a>
        </div>
      </div>
      <a href="servicios.html" class="vn-nav-link" style="{{ serviciosStyle }}" style-hover="color:#fff;">Servicios</a>
      <a href="nosotros.html" class="vn-nav-link" style="{{ nosotrosStyle }}" style-hover="color:#fff;">Nosotros</a>
    </div>
    <a href="contacto.html" class="vn-cta" style="text-decoration:none; padding:10px 16px; border-radius:7px; background:#1C6FE8; color:#fff; font-size:13px; font-weight:700; white-space:nowrap; transition:background .25s ease, transform .2s ease, box-shadow .2s ease; box-shadow:0 9px 24px rgba(28,111,232,.2);" style-hover="background:#2A78EA; transform:translateY(-1px); box-shadow:0 12px 28px rgba(28,111,232,.3);">Consultar espacios</a>
    <button class="vn-burger" onClick="{{ toggleMenu }}" aria-label="Menú" style="flex-direction:column; gap:5px; background:transparent; border:none; cursor:pointer; padding:6px;">
      <span style="width:24px; height:2px; background:#fff; border-radius:2px;"></span>
      <span style="width:24px; height:2px; background:#fff; border-radius:2px;"></span>
      <span style="width:24px; height:2px; background:#fff; border-radius:2px;"></span>
    </button>
  </div>
</nav>
<div id="vnMobileMenu" style="{{ menuStyle }}">
  <button onClick="{{ closeMenu }}" aria-label="Cerrar" style="position:absolute; top:22px; right:24px; background:transparent; border:none; color:#fff; font-size:34px; cursor:pointer; line-height:1; font-family:'Plus Jakarta Sans',sans-serif;">&times;</button>
  <sc-for list="{{ mlinksTop }}" as="ml" hint-placeholder-count="1">
    <a href="{{ ml.href }}" class="vn-mobile-link" onClick="{{ closeMenu }}" style="text-decoration:none; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">{{ ml.label }}</a>
  </sc-for>

  <button type="button" onClick="{{ toggleMobileProducts }}" style="display:flex; align-items:center; gap:9px; background:transparent; border:none; cursor:pointer; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">
    Formatos
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="{{ mobileProductsChevStyle }}"><path d="M6 9l6 6 6-6"></path></svg>
  </button>
  <div style="{{ mobileProductsPanelStyle }}">
    <a href="vista360-classic.html" onClick="{{ closeMenu }}" style="text-decoration:none; color:rgba(255,255,255,0.85); font-size:19px; font-weight:600; padding:6px 12px; font-family:'Plus Jakarta Sans',sans-serif;">VISTA360 Classic</a>
    <a href="vista360-digital.html" onClick="{{ closeMenu }}" style="text-decoration:none; color:rgba(255,255,255,0.85); font-size:19px; font-weight:600; padding:6px 12px; font-family:'Plus Jakarta Sans',sans-serif;">VISTA360 Digital</a>
  </div>

  <sc-for list="{{ mlinksBottom }}" as="ml" hint-placeholder-count="2">
    <a href="{{ ml.href }}" class="vn-mobile-link" onClick="{{ closeMenu }}" style="text-decoration:none; color:#fff; font-size:28px; font-weight:700; letter-spacing:-0.02em; padding:12px; font-family:'Plus Jakarta Sans',sans-serif;">{{ ml.label }}</a>
  </sc-for>
  <a href="contacto.html" class="vn-mobile-cta" onClick="{{ closeMenu }}">Consultar espacios</a>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:66},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;productos&quot;,&quot;servicios&quot;,&quot;ubicaciones&quot;,&quot;portafolio&quot;,&quot;contacto&quot;],&quot;default&quot;:&quot;inicio&quot;},&quot;transparent&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;topColor&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#0A1426&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false, menuOpen: false, mobileProductsOpen: false };

  componentDidMount() {
    // BUG FIX: __lastMenuOpen nunca se inicializaba. componentDidUpdate()
    // se ejecuta despues de CUALQUIER cambio de estado de este componente,
    // no solo cuando se abre/cierra el menu — y el primer scroll del
    // usuario cambia `scrolled` (scrollY > 40), lo cual TAMBIEN dispara
    // componentDidUpdate(). En ese primer llamado, `this.__lastMenuOpen`
    // era `undefined`, y como `false !== undefined`, el codigo pensaba
    // erroneamente que el menu "se acababa de cerrar" y ejecutaba
    // `window.scrollTo(0, this.__scrollY || 0)` — con __scrollY tambien
    // sin definir, eso es literalmente `scrollTo(0, 0)`. Resultado: el
    // primer scroll de cualquier pagina disparaba un salto de vuelta al
    // tope, SIN que el usuario haya tocado el menu para nada. Inicializar
    // esto aqui, antes de que pueda dispararse ningun otro cambio de
    // estado, evita por completo esa falsa deteccion.
    this.__lastMenuOpen = false;
    this.onScroll = () => {
      const s = window.scrollY > 40;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this.onScroll, { passive: true });
    this.onScroll();
    this.applyThemeColor();
    // Intento 2: el micro-scroll dentro de la apertura del menu no alcanzo
    // (mismo frame que el cambio de color — puede ser demasiado tarde o
    // simultaneo). Ahora se dispara apenas monta la pagina, ANTES de que
    // el usuario pueda tocar nada, dandole tiempo a Safari de "despertar"
    // su repintado del status bar con anticipacion. Con un pequeno delay
    // para no pelear con el layout inicial (splash, video del hero, etc).
    setTimeout(() => {
      if (window.scrollY === 0 && !this.state.menuOpen) {
        window.scrollTo(0, 1);
        window.scrollTo(0, 0);
      }
    }, 300);
  }
  applyThemeColor() {
    const topColor = this.props.topColor || '#05080F'; // color de marca por defecto; cada pagina puede pasar el tono de su propio hero
    const solidColor = '#05080F';  // mismo color real del hero — el que de verdad se ve en el status bar
    const menuColor = '#05080F';   // unificado: el mismo tono exacto, sin diferencia
    const transparent = this.props.transparent ?? false;
    const scrolled = !!this.state.scrolled;
    const menuOpen = !!this.state.menuOpen;
    const solid = !transparent || scrolled;
    const color = menuOpen ? menuColor : (solid ? solidColor : topColor);
    // BUG FIX REAL: iOS 26 Safari (Liquid Glass) YA NO usa el meta
    // theme-color en absoluto — colorea la barra de estado/toolbar
    // muestreando el background-color del elemento fixed de mas arriba,
    // y si ese es transparente (como nuestro <nav> antes de scrollear,
    // a proposito, para que se vea el video del hero), cae al
    // background-color de html/body. Antes de scrollear, ese fallback
    // nunca se habia sincronizado con el color real de la pagina, asi
    // que Safari mostraba un negro/oscuro por defecto — y abrir el menu
    // (que SI tiene fondo solido #081428) no bastaba para que Safari
    // re-muestree, porque el fallback de html/body seguia desactualizado.
    // Por eso scrollear una vez "lo arreglaba": eso cambiaba el <nav> a
    // solido y de paso disparaba el repintado. Ahora sincronizamos
    // html/body con el color correcto en cada cambio, no solo el <nav>.
    document.documentElement.style.backgroundColor = color;
    document.body.style.backgroundColor = color;
    // Se mantiene tambien el meta (no hace dano, y ayuda en Android/Chrome
    // y versiones viejas de Safari que si lo siguen leyendo).
    const old = document.querySelector('meta[name="theme-color"]');
    if (old) old.remove();
    const meta = document.createElement('meta');
    meta.setAttribute('name', 'theme-color');
    meta.setAttribute('content', color);
    document.head.appendChild(meta);
  }
  componentDidUpdate() {
    this.applyThemeColor();
    // El framework solo pasa prevProps, no prevState; guardamos el último
    // valor en una propiedad propia para detectar el cambio de menuOpen.
    var open = !!this.state.menuOpen;
    if (open !== this.__lastMenuOpen) {
      this.__lastMenuOpen = open;
      // Bloquear el scroll de la página de fondo: si se puede mover detrás
      // del menú, Safari pierde la referencia de dónde termina realmente
      // la pantalla y deja ver un hueco con contenido de otra parte abajo.
      var html = document.documentElement;
      if (open) {
        this.__scrollY = window.scrollY;
        // BUG FIX REAL: Safari (iOS) solo re-pinta el color del status
        // bar cuando detecta un gesto de scroll real — un tap en el
        // boton del menu no cuenta. Si el usuario nunca scrolleo antes
        // de abrir el menu, Safari se queda con el color por defecto
        // (negro) aunque el CSS ya tenga el color correcto. Acabamos de
        // confirmar esto: scrollear (aunque sea un poco) antes de abrir
        // el menu lo arregla siempre. Asi que simulamos ese mismo
        // "empujon" automaticamente: un scroll de 1px (imperceptible)
        // que despierta el repintado antes de bloquear el scroll.
        window.scrollTo(0, this.__scrollY + 1);
        window.scrollTo(0, this.__scrollY);
        html.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.top = (-this.__scrollY) + 'px';
        document.body.style.width = '100%';
      } else {
        html.style.overflow = '';
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.width = '';
        window.scrollTo(0, this.__scrollY || 0);
      }
    }
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this.onScroll);
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.width = '';
  }

  renderVals() {
    const active = this.props.active || 'inicio';
    const transparent = this.props.transparent ?? false;
    const scrolled = !!this.state.scrolled;
    const solid = !transparent || scrolled;

    const navStyle = {
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 150,
      touchAction: 'pan-y',
      // iOS 26 ya no usa theme-color: copia el background-color (no el
      // "background" con degradado) del elemento fijo de arriba para la
      // barra de estado. Por eso se separan en dos propiedades: una sólida
      // y limpia para que Safari la copie, y el degradado visual aparte.
      backgroundColor: solid ? '#05080F' : 'transparent',
      backgroundImage: solid ? 'linear-gradient(100deg, #05080F 0%, #0C1830 100%)' : 'none',
      boxShadow: scrolled ? '0 8px 30px rgba(5,12,28,0.42)' : 'none',
      borderBottom: '1px solid ' + (solid ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0)'),
      transition: 'box-shadow .4s ease, border-color .4s ease' /* sin transición en el color de fondo:
        animar el fondo de un elemento fijo mientras se hace scroll activo puede verse tembloroso/inestable en iOS */
    };

    const baseLink = (key) => ({
      textDecoration: 'none', fontSize: '16px', whiteSpace: 'nowrap', cursor: 'pointer',
      fontWeight: key === active ? 700 : 500,
      color: key === active ? '#fff' : 'rgba(255,255,255,0.82)',
      letterSpacing: '0',
      transition: 'color .2s',
      '--vn-active': key === active ? 1 : 0
    });
    const inicioStyle = baseLink('inicio');
    const productosStyle = baseLink('productos');
    const serviciosStyle = baseLink('servicios');
    const ubicacionesStyle = baseLink('ubicaciones');
    const nosotrosStyle = baseLink('nosotros');

    const mlinksTop = [
      ['Inicio', 'index.html']
    ].map(([label, href]) => ({ label, href }));

    const mlinksBottom = [
      ['Servicios', 'servicios.html'],
      ['Nosotros', 'nosotros.html']
    ].map(([label, href]) => ({ label, href }));

    const mobileProductsOpen = !!this.state.mobileProductsOpen;
    const mobileProductsChevStyle = { transform: mobileProductsOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform .3s ease' };
    const mobileProductsPanelStyle = {
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '10px',
      maxHeight: mobileProductsOpen ? '160px' : '0px',
      opacity: mobileProductsOpen ? 1 : 0,
      overflow: 'hidden',
      margin: mobileProductsOpen ? '4px 0 8px' : '0px',
      transition: 'max-height .4s cubic-bezier(.16,1,.3,1), opacity .3s ease, margin .4s ease'
    };

    const menuOpen = !!this.state.menuOpen;
    const menuStyle = {
      // Se quita backdropFilter: con background 100% solido (#081428,
      // sin transparencia) el blur no tiene nada detras que desenfocar
      // -- no se ve, es un no-op visual. Pero un backdrop-filter en el
      // MISMO elemento cuyo color de fondo el navegador necesita leer
      // limpio puede interferir con esa lectura. Se quita por completo:
      // cero perdida visual, una variable menos que pueda confundir la
      // forma en que se pinta el status bar.
      position: 'fixed', inset: 0, zIndex: 200, background: '#05080F',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '4px',
      opacity: menuOpen ? 1 : 0, visibility: menuOpen ? 'visible' : 'hidden', pointerEvents: menuOpen ? 'auto' : 'none',
      transition: 'opacity .35s ease, visibility .35s ease'
    };

    return {
      navStyle, inicioStyle, productosStyle, serviciosStyle, ubicacionesStyle, nosotrosStyle,
      mlinksTop, mlinksBottom, menuStyle,
      mobileProductsChevStyle, mobileProductsPanelStyle,
      toggleMobileProducts: () => this.setState((s) => ({ mobileProductsOpen: !s.mobileProductsOpen })),
      toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),
      closeMenu: () => this.setState({ menuOpen: false, mobileProductsOpen: false })
    };
  }
}
</script>
</body>
</html>
